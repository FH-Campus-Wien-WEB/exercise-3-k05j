<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Movie</title>
    <link rel="stylesheet" href="edit.css" />
    <script src="edit.js" defer></script>
  </head>
  <body>
    <header>
        <h1>Edit Movie</h1>
        <p>Edit the details of a specific Harry Potter movie.</p>
        <hr class="rounded" />
    </header>
    <main>
        <section id="movieForm">
            <form class="movieForm">
                <input type="hidden" id="imdbID" name="imdbID" />
                <input type="hidden" id="poster" name="poster" />
                <div class="edit-layout">
                    <div class="edit-poster">
                        <img id="posterImage" alt="Movie Poster" />
                    </div>
                    <div class="edit-fields">
                        <div>
                            <label for="title">Title:</label>
                            <input type="text" id="title" name="title" required />
                        </div>

                        <div class="field-row">
                            <div>
                                <label for="released">Released:</label>
                                <input type="date" id="released" name="released" required />
                            </div>
                            <div>
                                <label for="runtime">Runtime (minutes):</label>
                                <input type="number" id="runtime" name="runtime" required />
                            </div>
                        </div>

                        <div>
                            <label for="genres">Genres:</label>
                            <select id="genres" name="Genres" multiple required size="3">
                                <option value="Action">Action</option>
                                <option value="Adventure">Adventure</option>
                                <option value="Animation">Animation</option>
                                <option value="Biography">Biography</option>
                                <option value="Comedy">Comedy</option>
                                <option value="Crime">Crime</option>
                                <option value="Documentary">Documentary</option>
                                <option value="Drama">Drama</option>
                                <option value="Family">Family</option>
                                <option value="Fantasy">Fantasy</option>
                                <option value="Film Noir">Film Noir</option>
                                <option value="History">History</option>
                                <option value="Horror">Horror</option>
                                <option value="Music">Music</option>
                                <option value="Musical">Musical</option>
                                <option value="Mystery">Mystery</option>
                                <option value="Romance">Romance</option>
                                <option value="Sci-Fi">Sci-Fi</option>
                                <option value="Short Film">Short Film</option>
                                <option value="Sport">Sport</option>
                                <option value="Superhero">Superhero</option>
                                <option value="Thriller">Thriller</option>
                                <option value="War">War</option>
                                <option value="Western">Western</option>
                            </select>
                        </div>

                        <div>
                            <label for="directors">Directors:</label>
                            <input type="text" id="directors" name="directors" required />
                        </div>

                        <div>
                            <label for="writers">Writers:</label>
                            <input type="text" id="writers" name="writers" required />
                        </div>

                        <div>
                            <label for="actors">Actors:</label>
                            <input type="text" id="actors" name="actors" required />
                        </div>

                        <div class="field-row">
                            <div>
                                <label for="metascore">Metascore:</label>
                                <input type="number" id="metascore" name="metascore" required />
                            </div>
                            <div>
                                <label for="imdbRating">IMDb Rating:</label>
                                <input type="number" step="0.1" id="imdbRating" name="imdbRating" required />
                            </div>
                        </div>

                        <div>
                            <label for="plot">Plot:</label>
                            <textarea id="plot" name="plot" rows="5" required></textarea>
                        </div>

                        <div class="button-group">
                            <button type="button" class="button cancel-button" onclick="window.location.href='index.html'">Cancel</button>
                            <button type="button" class="button save-button" onclick="putMovie()">Save Changes</button>
                        </div>
                    </div>
                </div>
            </form>
        </section>
    </main>
  </body>
</html>
